<!DOCTYPE html>
<html>
<head>
<title>Library Premium Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: linear-gradient(135deg, #1e1e2f, #2c3e50);
    color: white;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: #00c9a7;
}

/* ✨ Glow Active Button */
.sidebar button.active {
    background: #00c9a7;
    box-shadow: 0 0 10px rgba(0,201,167,0.6),
                0 0 20px rgba(0,201,167,0.4);
    transform: scale(1.03);
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* Stats */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.stat-box {
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    background: linear-gradient(135deg, #00c9a7, #005f73);
    text-align: center;
}

/* Inputs */
input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    width: 200px;
}

/* Buttons */
.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #00c9a7;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #00a896;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #00c9a7;
}

tr:nth-child(even) {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📚LibraSys</h2>
    <button class="nav-btn" onclick="show('add', this)">Add Book</button>
    <button class="nav-btn" onclick="show('issue', this)">Issue Book</button>
    <button class="nav-btn" onclick="show('return', this)">Return Book</button>
    <button class="nav-btn" onclick="loadBooks(); setActive(this)">View Books</button>
</div>

<div class="main">

    <!-- Stats -->
    <div class="stats">
        <div class="stat-box">
            <h3 id="totalBooks">0</h3>
            <p>Total Books</p>
        </div>
        <div class="stat-box">
            <h3 id="availableBooks">0</h3>
            <p>Available</p>
        </div>
    </div>

    <!-- Add -->
    <div id="add" class="card">
        <h2>Add Book</h2>
        <input id="title" placeholder="Book Title">
        <input id="cat" placeholder="Category ID">
        <button class="btn" onclick="addBook()">Add</button>
    </div>

    <!-- Issue -->
    <div id="issue" class="card" style="display:none;">
        <h2>Issue Book</h2>
        <input id="book_id" placeholder="Book ID">
        <input id="member_id" placeholder="Member ID">
        <button class="btn" onclick="issueBook()">Issue</button>
    </div>

    <!-- Return -->
    <div id="return" class="card" style="display:none;">
        <h2>Return Book</h2>
        <input id="issue_id" placeholder="Issue ID">
        <button class="btn" onclick="returnBook()">Return</button>
    </div>

    <!-- Table -->
    <div class="card">
        <h2>Books</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Available</th>
                </tr>
            </thead>
            <tbody id="books"></tbody>
        </table>
    </div>

</div>

<script>

function show(section, btn){
    document.getElementById("add").style.display="none";
    document.getElementById("issue").style.display="none";
    document.getElementById("return").style.display="none";
    document.getElementById(section).style.display="block";

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function setActive(btn){
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

async function addBook(){
    await fetch("http://localhost:5000/add-book", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            title: title.value,
            category_id: cat.value
        })
    });
    loadBooks();
}

async function issueBook(){
    await fetch("http://localhost:5000/issue-book", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            book_id: book_id.value,
            member_id: member_id.value
        })
    });
    loadBooks();
}

async function returnBook(){
    const res = await fetch("http://localhost:5000/return-book", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            issue_id: issue_id.value
        })
    });

    const data = await res.json();
    alert("Fine: ₹" + data.fine);
    loadBooks();
}

async function loadBooks(){
    const res = await fetch("http://localhost:5000/books");
    const data = await res.json();

    let rows = "";
    let total = data.length;
    let available = 0;

    data.forEach(b => {
        rows += `<tr>
            <td>${b.book_id}</td>
            <td>${b.title}</td>
            <td>${b.available_copies}</td>
        </tr>`;

        available += b.available_copies;
    });

    document.getElementById("books").innerHTML = rows;
    document.getElementById("totalBooks").innerText = total;
    document.getElementById("availableBooks").innerText = available;
}

loadBooks();

</script>

</body>
</html>
